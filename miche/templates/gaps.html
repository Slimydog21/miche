<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Miche — Gap Analysis</title>
  <link rel="stylesheet" href="/static/miche.css" />
  <link rel="stylesheet" href="/static/orchestrate.css" />
  <link rel="stylesheet" href="/static/island.css" />
  <script type="module" src="/static/gaps.js" defer></script>
</head>
<body class="miche-orchestrate">
  <a class="skip-link" href="#miche-main">Skip to gaps</a>
  <header class="miche-header" role="banner">
    <div class="miche-header__brand">
      <a class="miche-header__back" href="/orchestrate">← Orchestration</a>
      <img src="/static/mascot/miche-mascot-hero-static.png" alt="Miche" width="40" height="40" style="border-radius: 6px; border: 2px solid var(--color-border-3000, #dadbd2);" />
      <p class="miche-header__eyebrow">Miche Platform</p>
      <h1 class="miche-header__title">Gap Analysis</h1>
      <p class="miche-header__lede">Review gaps detected by the quality loop. Accept, dispute, or anchor with voice.</p>
    </div>
  </header>
  <main id="miche-main" class="orchestrate-main" role="main">
    <div class="orchestrate-toolbar">
      <p class="orchestrate-toolbar__status" data-connection-status>Connecting…</p>
      <div>
        <label class="orchestrate-label">Parent Run ID: <input type="text" data-parent-run-id class="orchestrate-input" placeholder="Enter run ID" style="width:200px;display:inline-block"></label>
        <button class="orchestrate-btn" data-action="load-gaps">Load Gaps</button>
      </div>
    </div>
    <div data-gaps-grid class="orchestrate-grid">
      <p class="orchestrate-empty">Enter a parent run ID to load gap reports.</p>
    </div>
  </main>
  <div id="miche-island-mount" class="miche-island-mount" data-island-ready="false" aria-label="Floating island mount"></div>
</body>
</html>
